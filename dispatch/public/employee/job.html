<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job | Heat Pump Butler Dispatch</title>
<link rel="icon" href="../../assets/logo-mark-hp.png">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="mobile-app">

<header class="mobile-header">
  <div class="top-row back-row">
    <a href="index.html" class="icon-btn" aria-label="Back">&#8592;</a>
    <h1 id="page-title">Job details</h1>
    <button class="icon-btn" id="share-btn" aria-label="Share job">&#9992;&#65039;</button>
  </div>
</header>

<div class="mobile-content" id="content">
  <div class="center-loading">Loading job…</div>
</div>

<script type="module">
  import { requireRole } from "../shared/auth.js";
  import {
    getJob,
    ensureDraftReport,
    ensureInspectionDefaults,
    saveInspectionData,
    saveReportNotes,
    updateChecklistItem,
    submitReport,
    setJobStatus,
    listPhotos,
    addPhotoDoc,
    startOrResumeTimer,
    pauseTimer,
    finalizeTimer,
  } from "../shared/firestore.js";
  import { uploadJobPhoto, getPhotoUrl } from "../shared/storage.js";
  import {
    CHECKLIST_ITEMS,
    checklistProgress,
    firstIncompleteItem,
    EQUIPMENT_INSPECTION_ITEMS,
    AIR_QUALITY_FIELDS,
    computeHealthScore,
  } from "../shared/checklist.js";

  const session = await requireRole("employee");
  if (!session) throw new Error("redirecting");
  const { user } = session;

  const jobId = new URLSearchParams(location.search).get("id");
  const content = document.getElementById("content");

  if (!jobId) {
    content.innerHTML = `<div class="empty-state">No job specified.</div>`;
    throw new Error("no job id");
  }

  let job;
  try {
    job = await getJob(jobId);
  } catch {
    job = null;
  }

  if (!job || job.assignedTo !== user.uid) {
    content.innerHTML = `<div class="empty-state">Job not found, or it isn't assigned to you.</div>`;
    throw new Error("not your job");
  }

  let report = await ensureDraftReport(jobId, user.uid);
  if (job.status === "in_progress" || job.status === "completed") {
    report = await ensureInspectionDefaults(jobId, job, report);
  }
  let photos = await loadPhotos();
  let activeKey = firstIncompleteItem(report.checklist);
  let timerInterval = null;

  async function loadPhotos() {
    const raw = await listPhotos(jobId);
    return Promise.all(raw.map(async (p) => ({ ...p, url: await getPhotoUrl(p.storagePath) })));
  }

  function photosFor(itemKey, phase) {
    return photos.filter((p) => p.itemKey === itemKey && (phase === undefined || p.phase === phase));
  }

  function dateInputValue(ts) {
    if (!ts) return "";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toISOString().slice(0, 10);
  }

  function esc(s) {
    const div = document.createElement("div");
    div.textContent = s || "";
    return div.innerHTML;
  }

  function fmtTime(ts) {
    if (!ts) return "--";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  }

  function fmtElapsed(totalSeconds) {
    const s = Math.max(0, Math.round(totalSeconds));
    const hh = Math.floor(s / 3600);
    const mm = Math.floor((s % 3600) / 60);
    const ss = s % 60;
    return [hh, mm, ss].map((n) => String(n).padStart(2, "0")).join(":");
  }

  function currentElapsedSeconds() {
    let base = report.timerElapsedSeconds || 0;
    if (report.timerState === "running" && report.timerStartedAt) {
      base += Math.max(0, (Date.now() - report.timerStartedAt.toMillis()) / 1000);
    }
    return base;
  }

  document.getElementById("share-btn").addEventListener("click", async () => {
    const summary = `${job.customerName} — ${job.address} — ${fmtTime(job.scheduledStart)}`;
    try {
      await navigator.clipboard.writeText(summary);
      alert("Job summary copied to clipboard.");
    } catch {
      alert(summary);
    }
  });

  function render() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    const isSubmitted = report.status === "submitted";
    const started = job.status === "in_progress" || job.status === "completed";
    document.getElementById("page-title").textContent = isSubmitted
      ? "Job completed"
      : started
      ? "Job in progress"
      : "Job details";

    if (!started) {
      renderDetailsMode();
    } else {
      renderProgressMode(isSubmitted);
      if (!isSubmitted && report.timerState === "running") {
        timerInterval = setInterval(() => {
          const el = document.getElementById("timer-display");
          if (el) el.textContent = fmtElapsed(currentElapsedSeconds());
        }, 1000);
      }
    }
  }

  function renderDetailsMode() {
    const progress = checklistProgress(report.checklist);
    content.innerHTML = `
      <div class="card">
        <h2 style="font-size:1.15rem; color:var(--navy);">${esc(job.customerName)}</h2>
        <p class="text-muted mt-8">${esc(job.customerPhone) || "No phone on file"}</p>
        <p class="text-muted">${esc(job.address)}</p>
        <p class="mt-8" style="font-weight:600; color:var(--navy);">${fmtTime(job.scheduledStart)}${job.scheduledEnd ? " – " + fmtTime(job.scheduledEnd) : ""}</p>
      </div>

      ${job.equipment && (job.equipment.manufacturer || job.equipment.model || job.equipment.outdoorUnitSerial) ? `
      <div class="mobile-section-title mt-16"><h2>Equipment</h2></div>
      <div class="equipment-card">
        ${job.equipment.manufacturer ? `<div class="equipment-row"><span class="k">Manufacturer</span><span class="v">${esc(job.equipment.manufacturer)}</span></div>` : ""}
        ${job.equipment.model ? `<div class="equipment-row"><span class="k">Model</span><span class="v">${esc(job.equipment.model)} <button class="copy-btn" id="copy-model" aria-label="Copy model">&#128203;</button></span></div>` : ""}
        ${job.equipment.outdoorUnitSerial ? `<div class="equipment-row"><span class="k">Outdoor Unit Serial</span><span class="v">${esc(job.equipment.outdoorUnitSerial)}</span></div>` : ""}
      </div>` : ""}

      ${job.notes ? `
      <div class="mobile-section-title mt-16"><h2>Customer notes</h2></div>
      <div class="card">${esc(job.notes)}</div>` : ""}

      <div class="mobile-section-title mt-16"><h2>Job checklist</h2><span class="text-muted" style="font-size:0.85rem;">${progress.done} of ${progress.total} completed</span></div>
      <div class="card">
        <ul>
          ${CHECKLIST_ITEMS.map((item) => `<li style="padding:6px 0;">${esc(item.label)}</li>`).join("")}
        </ul>
      </div>

      <button class="btn btn-primary btn-block mt-24" id="start-btn">Start Job</button>
    `;

    document.getElementById("copy-model")?.addEventListener("click", async () => {
      try {
        await navigator.clipboard.writeText(job.equipment.model);
      } catch {}
    });

    document.getElementById("start-btn").addEventListener("click", async () => {
      await setJobStatus(jobId, "in_progress");
      await startOrResumeTimer(jobId);
      job.status = "in_progress";
      report = await ensureDraftReport(jobId, user.uid);
      report = await ensureInspectionDefaults(jobId, job, report);
      activeKey = firstIncompleteItem(report.checklist);
      render();
    });
  }

  function renderProgressMode(isSubmitted) {
    const progress = checklistProgress(report.checklist);
    const isPaused = report.timerState === "paused";

    content.innerHTML = `
      <div class="card">
        <h2 style="font-size:1.05rem; color:var(--navy);">${esc(job.customerName)}</h2>
        <p class="text-muted mt-8">${esc(job.address)}</p>
      </div>

      <div class="progress-header mt-16">
        <span class="frac">${progress.done} of ${progress.total} completed</span>
        <span class="pct">${progress.percent}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${progress.percent}%;"></div></div>

      ${!isSubmitted ? `
      <div class="timer-bar">
        <span id="timer-display" class="timer-display">${fmtElapsed(currentElapsedSeconds())}</span>
        <button class="btn ${isPaused ? "btn-primary" : "btn-secondary"} btn-sm" id="pause-resume-btn">${isPaused ? "Resume" : "Pause"}</button>
      </div>` : `<p class="text-muted mt-16">Total time: ${fmtElapsed(report.timerElapsedSeconds || 0)}</p>`}

      <div class="checklist-items mt-16" id="checklist-items"></div>

      <div class="card mt-24">
        <label for="overall-notes">Overall notes</label>
        <textarea id="overall-notes" placeholder="Anything else worth noting about this job..." ${isSubmitted ? "disabled" : ""}>${esc(report.notes)}</textarea>
      </div>

      ${renderInspectionSection(isSubmitted)}

      ${isSubmitted
        ? `<div class="success-msg show mt-16">Report submitted. Thanks!</div>`
        : `<button class="btn btn-primary btn-block mt-16" id="submit-btn">Submit Report</button>`
      }
      <div class="error-msg" id="error-msg"></div>
    `;

    renderChecklistItems(isSubmitted);
    wireInspectionHandlers(isSubmitted);

    if (!isSubmitted) {
      document.getElementById("pause-resume-btn").addEventListener("click", async () => {
        const btn = document.getElementById("pause-resume-btn");
        btn.disabled = true;
        if (isPaused) {
          await startOrResumeTimer(jobId);
        } else {
          await pauseTimer(jobId);
        }
        report = await ensureDraftReport(jobId, user.uid);
        render();
      });

      document.getElementById("overall-notes").addEventListener("change", async (e) => {
        await saveReportNotes(jobId, e.target.value);
      });

      document.getElementById("submit-btn").addEventListener("click", async (e) => {
        if (!confirm("Submit this report? You won't be able to edit it afterward.")) return;
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.innerHTML = '<span class="loading-spinner"></span> Submitting…';
        try {
          await saveReportNotes(jobId, document.getElementById("overall-notes").value);
          await saveInspectionData(jobId, collectInspectionData());
          await finalizeTimer(jobId);
          await submitReport(jobId);
          location.reload();
        } catch (err) {
          console.error(err);
          document.getElementById("error-msg").textContent = "Couldn't submit the report. Please try again.";
          document.getElementById("error-msg").classList.add("show");
          btn.disabled = false;
          btn.textContent = "Submit Report";
        }
      });
    }
  }

  function equipmentRow(zone, item, isSubmitted) {
    const checked = report.equipmentInspection && report.equipmentInspection[zone] && report.equipmentInspection[zone][item.key];
    return `
      <label class="checkbox-row">
        <input type="checkbox" data-equipment-zone="${zone}" data-equipment-key="${item.key}" ${checked ? "checked" : ""} ${isSubmitted ? "disabled" : ""}>
        <span>${esc(item.label)}</span>
      </label>`;
  }

  function airQualityRow(field, isSubmitted) {
    const current = (report.airQualityFindings && report.airQualityFindings[field.key]) || field.options[0];
    return `
      <div class="field">
        <label>${esc(field.label)}</label>
        <select data-aq-field="${field.key}" ${isSubmitted ? "disabled" : ""}>
          ${field.options.map((opt) => `<option ${opt === current ? "selected" : ""}>${esc(opt)}</option>`).join("")}
        </select>
      </div>`;
  }

  function renderInspectionSection(isSubmitted) {
    const showAirQuality = job.addOns && job.addOns.airQualityTest;
    return `
      <div class="mobile-section-title mt-24"><h2>Equipment Inspection</h2></div>
      <div class="card">
        <h4 class="text-muted" style="font-size:0.8rem; text-transform:uppercase; margin-bottom:8px;">Indoor Unit</h4>
        ${EQUIPMENT_INSPECTION_ITEMS.indoor.map((item) => equipmentRow("indoor", item, isSubmitted)).join("")}
        <h4 class="text-muted mt-16" style="font-size:0.8rem; text-transform:uppercase; margin-bottom:8px;">Outdoor Unit</h4>
        ${EQUIPMENT_INSPECTION_ITEMS.outdoor.map((item) => equipmentRow("outdoor", item, isSubmitted)).join("")}
      </div>

      ${showAirQuality ? `
      <div class="mobile-section-title mt-24"><h2>Air Quality Findings</h2></div>
      <div class="card">
        ${AIR_QUALITY_FIELDS.map((field) => airQualityRow(field, isSubmitted)).join("")}
      </div>` : ""}

      <div class="mobile-section-title mt-24"><h2>Summary</h2></div>
      <div class="card">
        <div class="field">
          <label for="health-score">Health Score (0–100)</label>
          <input type="number" id="health-score" min="0" max="100" value="${report.healthScore ?? 100}" ${isSubmitted ? "disabled" : ""}>
        </div>
        <div class="field">
          <label for="system-summary">System Summary</label>
          <textarea id="system-summary" ${isSubmitted ? "disabled" : ""}>${esc(report.systemSummary)}</textarea>
        </div>
        <div class="field">
          <label for="recommendations">Recommendations</label>
          <textarea id="recommendations" ${isSubmitted ? "disabled" : ""}>${esc(report.recommendations)}</textarea>
        </div>
        <div class="field">
          <label for="next-service">Next Recommended Service</label>
          <input type="date" id="next-service" value="${dateInputValue(report.nextRecommendedService)}" ${isSubmitted ? "disabled" : ""}>
        </div>
      </div>
    `;
  }

  function recomputeHealthScoreFromInputs() {
    const equipmentInspection = { indoor: {}, outdoor: {} };
    document.querySelectorAll("[data-equipment-zone]").forEach((cb) => {
      equipmentInspection[cb.dataset.equipmentZone][cb.dataset.equipmentKey] = cb.checked;
    });
    let airQualityFindings = null;
    const aqSelects = document.querySelectorAll("[data-aq-field]");
    if (aqSelects.length) {
      airQualityFindings = {};
      aqSelects.forEach((sel) => { airQualityFindings[sel.dataset.aqField] = sel.value; });
    }
    return computeHealthScore(equipmentInspection, airQualityFindings);
  }

  function wireInspectionHandlers(isSubmitted) {
    if (isSubmitted) return;

    async function recomputeAndSaveScore() {
      const score = recomputeHealthScoreFromInputs();
      const scoreInput = document.getElementById("health-score");
      if (scoreInput) scoreInput.value = score;
      await saveInspectionData(jobId, { healthScore: score });
    }

    document.querySelectorAll("[data-equipment-zone]").forEach((cb) => {
      cb.addEventListener("change", async () => {
        await saveInspectionData(jobId, {
          equipmentInspection: { [cb.dataset.equipmentZone]: { [cb.dataset.equipmentKey]: cb.checked } },
        });
        await recomputeAndSaveScore();
      });
    });

    document.querySelectorAll("[data-aq-field]").forEach((sel) => {
      sel.addEventListener("change", async () => {
        await saveInspectionData(jobId, { airQualityFindings: { [sel.dataset.aqField]: sel.value } });
        await recomputeAndSaveScore();
      });
    });

    document.getElementById("health-score").addEventListener("change", async (e) => {
      await saveInspectionData(jobId, { healthScore: parseInt(e.target.value, 10) || 0 });
    });
    document.getElementById("system-summary").addEventListener("change", async (e) => {
      await saveInspectionData(jobId, { systemSummary: e.target.value });
    });
    document.getElementById("recommendations").addEventListener("change", async (e) => {
      await saveInspectionData(jobId, { recommendations: e.target.value });
    });
    document.getElementById("next-service").addEventListener("change", async (e) => {
      if (e.target.value) await saveInspectionData(jobId, { nextRecommendedService: new Date(e.target.value) });
    });
  }

  /** Reads the current DOM state of every inspection/summary field — used as
   * a final belt-and-suspenders save at Submit time, in case a field was
   * edited but never blurred (so its 'change' handler never fired). */
  function collectInspectionData() {
    const equipmentInspection = { indoor: {}, outdoor: {} };
    document.querySelectorAll("[data-equipment-zone]").forEach((cb) => {
      equipmentInspection[cb.dataset.equipmentZone][cb.dataset.equipmentKey] = cb.checked;
    });
    const data = {
      equipmentInspection,
      healthScore: parseInt(document.getElementById("health-score").value, 10) || 0,
      systemSummary: document.getElementById("system-summary").value,
      recommendations: document.getElementById("recommendations").value,
    };
    const nextServiceVal = document.getElementById("next-service").value;
    if (nextServiceVal) data.nextRecommendedService = new Date(nextServiceVal);

    const aqSelects = document.querySelectorAll("[data-aq-field]");
    if (aqSelects.length) {
      const airQualityFindings = {};
      aqSelects.forEach((sel) => { airQualityFindings[sel.dataset.aqField] = sel.value; });
      data.airQualityFindings = airQualityFindings;
    }
    return data;
  }

  function phaseCaptureRow(item, phase, isDone) {
    const phasePhotos = photosFor(item.key, phase);
    const thumbs = phasePhotos.map((p) => `<div class="photo-thumb"><img src="${p.url}"></div>`).join("");
    const cameraBtn = isDone ? "" : `<label class="camera-btn" aria-label="Add ${phase} photo">&#128247;<input type="file" accept="image/*" capture="environment" hidden data-photo-for="${item.key}" data-phase="${phase}"></label>`;
    return `
      <div style="flex:1; min-width:110px;">
        <div class="text-muted" style="font-size:0.7rem; text-transform:uppercase; letter-spacing:0.03em; margin-bottom:4px;">${phase}</div>
        <div class="item-photo-row" data-phase-row="${item.key}-${phase}">${thumbs}${cameraBtn}</div>
      </div>`;
  }

  function renderChecklistItems(isSubmitted) {
    const wrap = document.getElementById("checklist-items");
    wrap.innerHTML = CHECKLIST_ITEMS.map((item) => {
      const state = report.checklist[item.key] || { done: false, note: "" };
      const isActive = !isSubmitted && !state.done && item.key === activeKey;
      const cls = state.done ? "done" : isActive ? "active" : "pending";
      const itemPhotos = photosFor(item.key);

      return `
      <div class="checklist-item-card ${cls}" data-key="${item.key}">
        <div class="row" data-toggle="${item.key}">
          <div class="check-circle">${state.done ? "&#10003;" : ""}</div>
          <div style="flex:1;">
            <div class="label">${esc(item.label)}</div>
            ${state.done && state.note ? `<div class="item-note-display">${esc(state.note)}</div>` : ""}
          </div>
        </div>
        ${state.done && itemPhotos.length ? `<div class="flex-gap" style="margin-left:36px;">${phaseCaptureRow(item, "before", true)}${phaseCaptureRow(item, "after", true)}</div>` : ""}
        ${isActive ? `
        <div class="item-detail">
          <textarea data-note-for="${item.key}" placeholder="Notes for this step...">${esc(state.note)}</textarea>
          <div class="flex-gap mt-8">
            ${phaseCaptureRow(item, "before", false)}
            ${phaseCaptureRow(item, "after", false)}
          </div>
          <button class="btn btn-primary btn-sm mt-8" data-done-for="${item.key}">Mark Done</button>
        </div>` : ""}
      </div>`;
    }).join("");

    if (isSubmitted) return;

    wrap.querySelectorAll("[data-toggle]").forEach((row) => {
      row.addEventListener("click", () => {
        const key = row.dataset.toggle;
        if (report.checklist[key] && report.checklist[key].done) return;
        activeKey = key;
        renderChecklistItems(false);
      });
    });

    wrap.querySelectorAll("[data-photo-for]").forEach((input) => {
      input.addEventListener("change", async () => {
        const key = input.dataset.photoFor;
        const phase = input.dataset.phase;
        const file = input.files && input.files[0];
        if (!file) return;
        try {
          const { storagePath, downloadURL } = await uploadJobPhoto(jobId, file);
          await addPhotoDoc(jobId, { storagePath, itemKey: key, phase, uploadedBy: user.uid, employeeId: user.uid });
          photos = await loadPhotos();
          // Insert the new thumbnail directly rather than re-rendering the
          // whole card — a full re-render would wipe out whatever the
          // technician has typed into this item's (unsaved) note textarea.
          const thumb = document.createElement("div");
          thumb.className = "photo-thumb";
          thumb.innerHTML = `<img src="${downloadURL}">`;
          input.closest(".item-photo-row").insertBefore(thumb, input.closest("label"));
        } catch (err) {
          console.error(err);
        }
      });
    });

    wrap.querySelectorAll("[data-done-for]").forEach((btn) => {
      btn.addEventListener("click", async () => {
        const key = btn.dataset.doneFor;
        const noteEl = wrap.querySelector(`[data-note-for="${key}"]`);
        const note = noteEl ? noteEl.value : "";
        btn.disabled = true;
        await updateChecklistItem(jobId, key, { done: true, note });
        report.checklist[key] = { done: true, note };
        activeKey = firstIncompleteItem(report.checklist);
        // Rebuilds the progress bar/header too, not just the checklist itself.
        renderProgressMode(false);
      });
    });
  }

  render();
</script>

</body>
</html>
