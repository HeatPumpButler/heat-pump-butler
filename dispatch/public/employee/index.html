<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule | Heat Pump Butler Dispatch</title>
<link rel="icon" href="../../assets/logo-mark-hp.png">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body class="mobile-app">

<header class="mobile-header" style="border-radius:0 0 0 0; padding-bottom: 18px;">
  <div class="top-row">
    <h1>Schedule</h1>
    <button class="icon-btn" id="logout-btn" aria-label="Sign out">&#8594;</button>
  </div>
</header>

<div class="mobile-content" style="padding-top: 20px;">
  <div class="tabs">
    <button class="tab active" data-filter="upcoming">Upcoming</button>
    <button class="tab" data-filter="completed">Completed</button>
    <button class="tab" data-filter="all">All</button>
  </div>

  <div class="day-list" id="jobs-card">
    <div class="center-loading">Loading your jobs…</div>
  </div>
</div>

<nav class="bottom-tabs">
  <a href="home.html"><span class="tab-icon">&#127968;</span>Home</a>
  <a href="index.html" class="active"><span class="tab-icon">&#128197;</span>Schedule</a>
</nav>

<script type="module">
  import { requireRole, logout } from "../shared/auth.js";
  import { listJobsForEmployee } from "../shared/firestore.js";

  const session = await requireRole("employee");
  if (!session) throw new Error("redirecting");
  const { user } = session;

  document.getElementById("logout-btn").addEventListener("click", async () => {
    await logout();
    location.href = "/login.html";
  });

  let allJobs = [];
  let currentFilter = "upcoming";

  function fmtDate(ts) {
    if (!ts) return "No date set";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }

  function render() {
    const card = document.getElementById("jobs-card");
    let jobs = allJobs;
    if (currentFilter === "upcoming") {
      jobs = allJobs.filter((j) => j.status === "assigned" || j.status === "in_progress");
    } else if (currentFilter === "completed") {
      jobs = allJobs.filter((j) => j.status === "completed");
    }

    if (jobs.length === 0) {
      card.innerHTML = `<div class="empty-state">No jobs here right now.</div>`;
      return;
    }

    card.innerHTML = jobs
      .map(
        (j) => `
      <div class="day-list-item" onclick="location.href='job.html?id=${j.id}'">
        <span class="status-dot ${j.status}"></span>
        <div style="flex:1;">
          <div class="name">${escapeHtml(j.customerName)}</div>
          <div class="sub">${escapeHtml(j.address)} &middot; ${fmtDate(j.scheduledStart)}</div>
        </div>
        <span class="badge badge-${j.status}">${j.status.replace("_", " ")}</span>
      </div>`
      )
      .join("");
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s || "";
    return div.innerHTML;
  }

  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  try {
    allJobs = await listJobsForEmployee(user.uid);
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("jobs-card").innerHTML = `<div class="empty-state">Couldn't load jobs. Please refresh.</div>`;
  }
</script>

</body>
</html>
