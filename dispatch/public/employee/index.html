<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Jobs | Heat Pump Butler Dispatch</title>
<link rel="icon" href="../../assets/logo-mark-hp.png">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>

<header class="app-header">
  <nav class="app-nav">
    <a href="index.html" class="app-logo">
      <img src="../../assets/logo-mark-hp.png" alt="Heat Pump Butler">
      Dispatch
    </a>
    <div class="flex-gap" style="align-items:center;">
      <span class="user-chip" id="user-chip"></span>
      <button class="btn btn-secondary btn-sm" id="logout-btn">Sign Out</button>
    </div>
  </nav>
</header>

<main class="app-main">
  <div class="container">
    <div class="page-head">
      <div>
        <h1>My Jobs</h1>
        <p>Jobs assigned to you</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" data-filter="upcoming">Upcoming</button>
      <button class="tab" data-filter="completed">Completed</button>
      <button class="tab" data-filter="all">All</button>
    </div>

    <div class="card" id="jobs-card">
      <div class="center-loading">Loading your jobs…</div>
    </div>
  </div>
</main>

<script type="module">
  import { requireRole, logout } from "../shared/auth.js";
  import { listJobsForEmployee } from "../shared/firestore.js";

  const session = await requireRole("employee");
  if (!session) throw new Error("redirecting");
  const { user, profile } = session;

  document.getElementById("user-chip").textContent = profile.displayName || profile.email;
  document.getElementById("logout-btn").addEventListener("click", async () => {
    await logout();
    location.href = "/login.html";
  });

  let allJobs = [];
  let currentFilter = "upcoming";

  function fmtDate(ts) {
    if (!ts) return "No date set";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleString(undefined, { weekday: "short", month: "short", day: "numeric", hour: "numeric", minute: "2-digit" });
  }

  function render() {
    const card = document.getElementById("jobs-card");
    let jobs = allJobs;
    if (currentFilter === "upcoming") {
      jobs = allJobs.filter((j) => j.status === "assigned" || j.status === "in_progress");
    } else if (currentFilter === "completed") {
      jobs = allJobs.filter((j) => j.status === "completed");
    }

    if (jobs.length === 0) {
      card.innerHTML = `<div class="empty-state">No jobs here right now.</div>`;
      return;
    }

    card.innerHTML = jobs
      .map(
        (j) => `
      <div class="job-item">
        <div>
          <h3>${escapeHtml(j.customerName)}</h3>
          <div class="meta">${escapeHtml(j.address)} &middot; ${fmtDate(j.scheduledStart)}</div>
        </div>
        <div class="right">
          <span class="badge badge-${j.status}">${j.status.replace("_", " ")}</span>
          <a href="job.html?id=${j.id}" class="btn btn-primary btn-sm">Open</a>
        </div>
      </div>`
      )
      .join("");
  }

  function escapeHtml(s) {
    const div = document.createElement("div");
    div.textContent = s || "";
    return div.innerHTML;
  }

  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");
      currentFilter = tab.dataset.filter;
      render();
    });
  });

  try {
    allJobs = await listJobsForEmployee(user.uid);
    render();
  } catch (err) {
    console.error(err);
    document.getElementById("jobs-card").innerHTML = `<div class="empty-state">Couldn't load jobs. Please refresh.</div>`;
  }
</script>

</body>
</html>
