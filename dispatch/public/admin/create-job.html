<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Job | Heat Pump Butler Dispatch</title>
<link rel="icon" href="../../assets/logo-mark-hp.png">
<link rel="stylesheet" href="../shared/styles.css">
</head>
<body>

<header class="app-header">
  <nav class="app-nav">
    <a href="index.html" class="app-logo">
      <img src="../../assets/logo-mark-hp.png" alt="Heat Pump Butler">
      Dispatch Admin
    </a>
    <a href="index.html" class="btn btn-secondary btn-sm">&larr; Jobs</a>
  </nav>
</header>

<main class="app-main">
  <div class="container" style="max-width:640px;">
    <div class="page-head">
      <div>
        <h1>New Job</h1>
        <p>Manually add a job (until Cal.com auto-import is set up)</p>
      </div>
    </div>

    <div class="card">
      <div class="error-msg" id="error-msg"></div>
      <form id="job-form">
        <div class="field">
          <label for="customerName">Customer Name</label>
          <input id="customerName" required>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="customerPhone">Customer Phone</label>
            <input id="customerPhone" type="tel">
          </div>
          <div class="field">
            <label for="customerEmail">Customer Email</label>
            <input id="customerEmail" type="email">
          </div>
        </div>
        <div class="field">
          <label for="address">Service Address</label>
          <input id="address" required>
        </div>
        <div class="field-row">
          <div class="field">
            <label for="scheduledStart">Scheduled Date &amp; Time</label>
            <input id="scheduledStart" type="datetime-local" required>
          </div>
          <div class="field">
            <label>Units</label>
            <div class="field-row" style="gap:8px;">
              <input id="idus" type="number" min="1" value="1" placeholder="Indoor">
              <input id="odus" type="number" min="1" value="1" placeholder="Outdoor">
            </div>
          </div>
        </div>
        <div class="field">
          <label for="notes">Customer Notes</label>
          <textarea id="notes" placeholder="Elevated units, access instructions, anything the technician should know..."></textarea>
        </div>

        <div class="field-row">
          <div class="field">
            <label for="manufacturer">Manufacturer</label>
            <select id="manufacturer">
              <option value="">Select manufacturer</option>
              <option>Mitsubishi Electric</option>
              <option>Daikin</option>
              <option>Fujitsu</option>
              <option>LG</option>
              <option>Samsung</option>
              <option>Gree</option>
              <option>Carrier</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="model">Model</label>
            <input id="model" placeholder="e.g. 4TTR4024L1000A">
          </div>
        </div>
        <div class="field">
          <label for="outdoorSerial">Outdoor Unit Serial</label>
          <input id="outdoorSerial" placeholder="Optional">
        </div>

        <label style="display:flex; align-items:flex-start; gap:10px; font-weight:600; cursor:pointer; margin-bottom:20px;">
          <input type="checkbox" id="airQualityTest" style="width:18px; height:18px; margin-top:2px;">
          <span>Air Quality Test add-on <span class="text-muted" style="font-weight:400;">(+$49)</span></span>
        </label>

        <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create Job</button>
      </form>
    </div>
  </div>
</main>

<script type="module">
  import { requireRole } from "../shared/auth.js";
  import { createJob } from "../shared/firestore.js";

  const session = await requireRole("admin");
  if (!session) throw new Error("redirecting");
  const { user } = session;

  document.getElementById("job-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submit-btn");
    const errorMsg = document.getElementById("error-msg");
    errorMsg.classList.remove("show");
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-spinner"></span> Creating…';

    try {
      const scheduledStartRaw = document.getElementById("scheduledStart").value;
      const jobId = await createJob(
        {
          customerName: document.getElementById("customerName").value.trim(),
          customerPhone: document.getElementById("customerPhone").value.trim(),
          customerEmail: document.getElementById("customerEmail").value.trim(),
          address: document.getElementById("address").value.trim(),
          scheduledStart: new Date(scheduledStartRaw),
          notes: document.getElementById("notes").value.trim(),
          unitCounts: {
            indoor: parseInt(document.getElementById("idus").value, 10) || 1,
            outdoor: parseInt(document.getElementById("odus").value, 10) || 1,
          },
          equipment: {
            manufacturer: document.getElementById("manufacturer").value || null,
            model: document.getElementById("model").value.trim() || null,
            outdoorUnitSerial: document.getElementById("outdoorSerial").value.trim() || null,
          },
          addOns: {
            airQualityTest: document.getElementById("airQualityTest").checked,
          },
        },
        user.uid
      );
      location.href = `job.html?id=${jobId}`;
    } catch (err) {
      console.error(err);
      errorMsg.textContent = "Couldn't create the job. Please try again.";
      errorMsg.classList.add("show");
      btn.disabled = false;
      btn.textContent = "Create Job";
    }
  });
</script>

</body>
</html>
